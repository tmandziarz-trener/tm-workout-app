<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('Stylesheet'); ?>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

<header>
  <div class="logo-icon">TM</div>
  <div class="logo-text">
    <div class="top">TOMASZ MANDZIARZ</div>
    <div class="bottom">WORKOUT — PANEL TRENERA</div>
  </div>
</header>

<main>

  <div id="screen-lock" class="card">
    <h2>Panel trenera</h2>
    <div class="sub">Ten widok jest chroniony hasłem — nie jest to publiczna część aplikacji.</div>
    <div class="field"><label>Hasło</label><input type="password" id="pwd"></div>
    <button class="btn" onclick="checkPassword()">Wejdź</button>
  </div>

  <div id="screen-dash" style="display:none;">
    <div class="card">
      <h2>Wybierz klienta</h2>
      <select id="clientSelect" onchange="loadClient()"><option value="">— wybierz —</option></select>
    </div>

    <div id="dashContent" style="display:none;">
      <div class="card">
        <div class="stat-row" id="statRow"></div>
        <canvas id="weightChart"></canvas>
      </div>
      <div class="card"><h2>Obwody ciała</h2><canvas id="circChart"></canvas></div>
      <div class="card"><h2>Objętość treningowa</h2><canvas id="volChart"></canvas></div>
      <div class="card">
        <h2>Ćwiczenia zgłoszone do przeglądu</h2>
        <div id="exList"></div>
      </div>
      <div class="card">
        <h2>Historia pomiarów</h2>
        <table id="historyTable"></table>
      </div>
    </div>
  </div>

</main>

<script>
let weightChart, circChart, volChart;

function checkPassword(){
  const pwd = document.getElementById('pwd').value;
  google.script.run.withSuccessHandler(ok => {
    if (ok) {
      sessionStorage.setItem('tmw_trener_ok', '1');
      document.getElementById('screen-lock').style.display = 'none';
      document.getElementById('screen-dash').style.display = 'block';
      loadNames();
    } else {
      alert('Błędne hasło.');
    }
  }).apiCheckTrenerPassword(pwd);
}

if (sessionStorage.getItem('tmw_trener_ok') === '1') {
  document.getElementById('screen-lock').style.display = 'none';
  document.getElementById('screen-dash').style.display = 'block';
  loadNames();
}

function loadNames(){
  google.script.run.withSuccessHandler(names => {
    const sel = document.getElementById('clientSelect');
    names.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n; opt.textContent = n;
      sel.appendChild(opt);
    });
  }).apiGetClientNames();
}

function loadClient(){
  const name = document.getElementById('clientSelect').value;
  if (!name) { document.getElementById('dashContent').style.display = 'none'; return; }
  google.script.run.withSuccessHandler(data => renderDash(name, data)).apiGetClientHistory(name);
}

function num(v){ const n = parseFloat(v); return isNaN(n) ? null : n; }

function renderDash(name, data){
  document.getElementById('dashContent').style.display = 'block';
  const meas = data.meas || [];
  const sets = data.sets || [];

  if (meas.length) {
    const last = meas[meas.length-1];
    const prev = meas.length > 1 ? meas[meas.length-2] : last;
    document.getElementById('statRow').innerHTML = `
      ${stat('Masa ciała', (last['Masa ciała (kg)']||'-')+' kg', num(last['Masa ciała (kg)']) - num(prev['Masa ciała (kg)']))}
      ${stat('Talia', (last['Talia — pępek (cm)']||'-')+' cm', num(last['Talia — pępek (cm)']) - num(prev['Talia — pępek (cm)']))}
    `;
  } else {
    document.getElementById('statRow').innerHTML = '<div class="hint">Brak jeszcze pomiarów tego klienta.</div>';
  }

  const labels = meas.map(m => m['Data pomiaru']);
  if (weightChart) weightChart.destroy();
  weightChart = new Chart(document.getElementById('weightChart'), {
    type:'line',
    data:{labels, datasets:[{label:'Masa ciała (kg)', data:meas.map(m=>num(m['Masa ciała (kg)'])), borderColor:'#c5a689', backgroundColor:'#c5a68933', fill:true, tension:.3}]},
    options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:false}}}
  });

  if (circChart) circChart.destroy();
  circChart = new Chart(document.getElementById('circChart'), {
    type:'line',
    data:{labels, datasets:[
      {label:'Talia', data:meas.map(m=>num(m['Talia — pępek (cm)'])), borderColor:'#1a1a1a', tension:.3},
      {label:'Biodro', data:meas.map(m=>num(m['Biodro (cm)'])), borderColor:'#c5a689', tension:.3},
      {label:'Klatka', data:meas.map(m=>num(m['Klatka piersiowa (cm)'])), borderColor:'#b5573f', tension:.3},
    ]},
    options:{scales:{y:{beginAtZero:false}}}
  });

  const volByDate = {};
  sets.forEach(s => {
    const d = s['Data'];
    const v = num(s['Objętość kg (auto)']) || 0;
    volByDate[d] = (volByDate[d]||0) + v;
  });
  const volLabels = Object.keys(volByDate);
  if (volChart) volChart.destroy();
  volChart = new Chart(document.getElementById('volChart'), {
    type:'bar',
    data:{labels: volLabels, datasets:[{label:'Objętość (kg)', data: volLabels.map(l=>volByDate[l]), backgroundColor:'#c5a689'}]},
    options:{plugins:{legend:{display:false}}}
  });

  const exList = document.getElementById('exList');
  if (sets.length === 0) {
    exList.innerHTML = '<div class="hint">Brak zgłoszonych ćwiczeń.</div>';
  } else {
    exList.innerHTML = sets.slice().reverse().map(s => `
      <div class="exercise-row">
        <strong>${s['Data']} — ${escapeHtml(s['Nazwa ćwiczenia']||'')}</strong><br>
        ${s['Liczba serii']||'-'}x${s['Powtórzenia']||'-'} @ ${s['Ciężar (kg)']||'-'}kg
        ${s['Objętość kg (auto)'] ? '(objętość: '+s['Objętość kg (auto)']+' kg)' : ''}
        ${s['Wideo z wykonania ćwiczenia'] ? '<br><a href="'+s['Wideo z wykonania ćwiczenia']+'" target="_blank">▶ zobacz wideo</a>' : ''}
        ${s['Opis / pytanie do trenera'] ? '<div class="note-flag">💬 '+escapeHtml(s['Opis / pytanie do trenera'])+'</div>' : ''}
      </div>
    `).join('');
  }

  const tbl = document.getElementById('historyTable');
  tbl.innerHTML = `
    <tr><th>Data</th><th>Waga</th><th>BMI</th><th>Talia</th><th>Biodro</th></tr>
    ${meas.slice().reverse().map(m => `
      <tr><td>${m['Data pomiaru']||''}</td><td>${m['Masa ciała (kg)']||''}</td><td>${m['BMI (auto)']?Number(m['BMI (auto)']).toFixed(1):''}</td><td>${m['Talia — pępek (cm)']||''}</td><td>${m['Biodro (cm)']||''}</td></tr>
    `).join('')}
  `;
}

function stat(label, value, delta){
  const hasDelta = delta !== null && !isNaN(delta);
  const isGood = hasDelta && delta <= 0;
  const arrow = hasDelta ? (delta>=0?'▲':'▼') : '';
  return `<div class="stat">
    <div class="lbl">${label}</div>
    <div class="num">${value}</div>
    ${hasDelta ? '<div style="font-size:12px;font-weight:700;color:'+(isGood?'#5a8a5a':'#b5573f')+'">'+arrow+' '+Math.abs(delta).toFixed(1)+' vs poprzedni</div>' : ''}
  </div>`;
}

function escapeHtml(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
